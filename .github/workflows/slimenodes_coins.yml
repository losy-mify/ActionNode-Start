name: SlimeNodes-Coins

on:
  schedule:
    - cron: '0 2 * * *'   # 每天 UTC 02:00 运行（可按需调整）
  workflow_dispatch:

jobs:
  claim:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 最长6小时（含Wait类型等待）

    steps:
      - name: 📥 拉取私库脚本
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/ActionNode-Start-Private
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: 📂 移动脚本到工作目录
        run: cp private/slimenodes_coins.py slimenodes_coins.py

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            google-chrome-stable \
            xvfb \
            xdotool

      - name: 🐍 安装 Python 依赖
        run: |
          pip install seleniumbase
          seleniumbase install chromedriver

      - name: 🛡️ 启动 GOST 代理
        if: ${{ env.GOST_PROXY != '' }}
        env:
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
        run: |
          VERSION=$(curl -s https://api.github.com/repos/ginuerzh/gost/releases/latest \
            | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
          echo "📦 GOST 版本: $VERSION"
          wget -q "https://github.com/ginuerzh/gost/releases/download/v${VERSION}/gost_${VERSION}_linux_amd64.tar.gz"
          tar -xzf "gost_${VERSION}_linux_amd64.tar.gz"
          chmod +x gost
          nohup ./gost -L http://:8080 -F "$GOST_PROXY" > gost.log 2>&1 &
          sleep 3
          echo "✅ GOST 已启动"
          echo "GOST_PROXY_URL=http://127.0.0.1:8080" >> $GITHUB_ENV

      - name: 🚀 运行领取脚本
        id: run_script
        env:
          PYTHONIOENCODING: utf-8
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          SLIME_COOKIE:  ${{ secrets.SLIME_COOKIE }}
          TG_BOT:        ${{ secrets.TG_BOT }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            python slimenodes_coins.py 2>&1 | tee run.log

          # 从日志里提取新 cookie
          NEW_COOKIE=$(grep -oP '(?<=\[COOKIE_UPDATE\]).*(?=\[/COOKIE_UPDATE\])' run.log | tail -1)
          if [ -n "$NEW_COOKIE" ]; then
            echo "new_cookie=$NEW_COOKIE" >> $GITHUB_OUTPUT
            echo "✅ 检测到新 Cookie，准备更新"
          else
            echo "new_cookie=" >> $GITHUB_OUTPUT
            echo "ℹ️ 未检测到新 Cookie（Cookie 登录成功，无需更新）"
          fi

      # ── 写回私库 ──────────────────────────────────────────────────
      - name: 🍪 写回新 Cookie 到私库脚本
        if: steps.run_script.outputs.new_cookie != ''
        env:
          PRIVATE_REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          NEW_COOKIE="${{ steps.run_script.outputs.new_cookie }}"

          # 用 sed 替换私库脚本里的 SLIME_COOKIE 硬编码行（如有），
          # 并写入一个专用的 .cookie 文件供下次直接读取
          echo "$NEW_COOKIE" > private/slime.cookie
          echo "✅ Cookie 已写入 private/slime.cookie"

          cd private
          if ! git diff --quiet; then
            git config user.email "actions@github.com"
            git config user.name "GitHub Actions"
            git add slime.cookie
            git commit -m "🍪 自动更新 SLIME_COOKIE $(date '+%Y-%m-%d %H:%M:%S')"
            git push "https://${PRIVATE_REPO_TOKEN}@github.com/${{ github.repository_owner }}/ActionNode-Start-Private.git" HEAD
            echo "✅ 已推回私库"
          else
            echo "ℹ️ Cookie 无变化，无需推送"
          fi

      # ── 同步更新 GitHub Secret（双保险）────────────────────────────
      - name: 🔐 更新 SLIME_COOKIE Secret
        if: steps.run_script.outputs.new_cookie != ''
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          NEW_COOKIE="${{ steps.run_script.outputs.new_cookie }}"
          REPO="${{ github.repository }}"

          # 获取仓库公钥
          PUB_KEY_DATA=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO/actions/secrets/public-key")
          KEY_ID=$(echo "$PUB_KEY_DATA" | python3 -c "import sys,json; print(json.load(sys.stdin)['key_id'])")
          PUB_KEY=$(echo "$PUB_KEY_DATA" | python3 -c "import sys,json; print(json.load(sys.stdin)['key'])")

          # 加密并上传新 Secret
          pip install PyNaCl -q
          ENCRYPTED=$(python3 -c "
import base64, sys
from nacl.public import PublicKey, SealedBox

pub_key_bytes  = base64.b64decode('$PUB_KEY')
secret_bytes   = '''$NEW_COOKIE'''.encode('utf-8')
sealed         = SealedBox(PublicKey(pub_key_bytes))
encrypted      = sealed.encrypt(secret_bytes)
print(base64.b64encode(encrypted).decode())
")

          curl -s -X PUT \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/$REPO/actions/secrets/SLIME_COOKIE" \
            -d "{\"encrypted_value\":\"$ENCRYPTED\",\"key_id\":\"$KEY_ID\"}"

          echo "✅ SLIME_COOKIE Secret 已更新"

      # ── 调试产物 ──────────────────────────────────────────────────
      - name: 📸 上传调试截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_id }}
          path: "*.png"
          retention-days: 3

      - name: 📋 上传运行日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_id }}
          path: "run.log"
          retention-days: 3
