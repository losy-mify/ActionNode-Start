name: Copper-Coins
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'  # 每天北京时间 10:00 运行，可按需修改

jobs:
  run_copper_coins:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 📥 下载私库脚本
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/ActionNode-Start-Private
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: 📂 移动脚本到工作目录
        run: mv private/copper_coins.js copper_coins.js

      - name: 🛡️ 启动 GOST 代理转发
        if: ${{ env.GOST_PROXY != '' }}
        env:
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
        run: |
          VERSION=$(curl -s https://api.github.com/repos/ginuerzh/gost/releases/latest \
            | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
          echo "📦 GOST 版本: $VERSION"
          wget -q "https://github.com/ginuerzh/gost/releases/download/v${VERSION}/gost_${VERSION}_linux_amd64.tar.gz"
          tar -xzf "gost_${VERSION}_linux_amd64.tar.gz"
          chmod +x gost
          nohup ./gost -L http://:8080 -F "$GOST_PROXY" > gost.log 2>&1 &
          sleep 3
          echo "✅ GOST 已启动，测试连通性..."
          curl -s -x http://127.0.0.1:8080 https://api.ipify.org \
            | sed 's/\([0-9]*\.[0-9]*\.[0-9]*\.\)[0-9]*/\1**/g'

      - name: 📦 安装 Node 依赖
        run: npm install https-proxy-agent

      - name: 🚀 运行脚本
        env:
          COPPER_COOKIE: ${{ secrets.COPPER_COOKIE }}
          TG_BOT: ${{ secrets.TG_BOT }}
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
        run: node copper_coins.js
